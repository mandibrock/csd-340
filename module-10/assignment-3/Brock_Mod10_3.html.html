<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Assignment 10.3">
    <meta name="author" content="Amanda Brock">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSD 340 Web Development with HTML and CSS</title>

    <style>

        /* ===== ROOT COLORS ===== */
        :root {
            --accent: 180, 167, 214;
            --accent-soft: rgba(180, 167, 214, 0.10);
            --accent-border: rgba(180, 167, 214, 0.2);
            --accent-strong: rgba(180, 167, 214, 0.35);

            --card-bg: rgba(10, 15, 25, 0.8);
            --container-bg: rgba(22, 27, 34, 0.85);

            --text-main: #c9d1d9;
            --text-heading: #e6e1ff;
        }

        body {
            min-height: 100vh;
            font-family: "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 20% 10%, rgba(180, 167, 214, 0.15), transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(120, 160, 255, 0.12), transparent 45%),
                radial-gradient(circle at 50% 100%, rgba(200, 140, 255, 0.1), transparent 50%),
                #0d1117;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.12;
            pointer-events: none;
        }

        #container {
            width: 70%;
            margin: 50px auto;
            padding: 35px 40px;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid var(--accent-border);
            box-shadow:
                0 15px 40px rgba(0,0,0,0.7),
                0 0 40px rgba(180, 167, 214, 0.08);
        }

        h1 {
            text-align: center;
            font-size: 32px;
            color: var(--text-heading);
            margin-bottom: 20px;
        }

        p {
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        #mainImage {
            display: block;
            width: 400px;
            max-width: 90%;
            margin: 0 auto;
            border-radius: 12px;
            border: 2px solid var(--accent-border);
            transition: all 0.3s ease;
            box-shadow:
                0 10px 20px rgba(0,0,0,0.5);
        }

        .gallery {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .thumbnail {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .thumbnail:hover {
            transform: translateY(-5px) scale(1.04);
            border-color: rgba(180, 167, 214, 0.4);
            box-shadow:
                0 8px 20px rgba(0,0,0,0.5),
                0 0 15px rgba(180, 167, 214, 0.2);
        }

        footer {
            margin-top: 40px;
            text-align: right;
        }

        footer a {
            color: #b4a7d6;
            text-decoration: none;

            padding: 6px 10px;
            border-radius: 6px;

            transition: all 0.2s ease;
        }

        footer a:hover {
            background: rgba(180, 167, 214, 0.08);
            color: #e2d9ff;
            text-decoration: underline;
        }

    </style>

    <script>
        function changeImage(imageFile) {
            let displayedImage = document.getElementById("mainImage");
            displayedImage.src = imageFile;
        }
    </script>

</head>

<body>

<div id="container">
    <h1>Assignment 10.3: JavaScript - Part 2</h1>
    <p>
        Click an image below to change the featured display.
    </p>

<img id="mainImage"
     src="raya1.jpg"
     alt="German Shepherd Puppy">

<div class="gallery">

    <img class="thumbnail"
         src="raya1.jpg"
         alt="Puppy Sitting"
         onclick="changeImage('raya1.jpg')">

    <img class="thumbnail"
         src="raya2.jpg"
         alt="Puppy Hiking"
         onclick="changeImage('raya2.jpg')">

    <img class="thumbnail"
         src="raya3.jpg"
         alt="Sleeping Puppy"
         onclick="changeImage('raya3.jpg')">

    <img class="thumbnail"
         src="raya4.jpg"
         alt="Adventure Puppy"
         onclick="changeImage('raya4.jpg')">

</div>

    <footer>
        <a href="../../index.html">← Back to Landing Page</a>
    </footer>

</div>

</body>
</html>
